name: deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant gradlew permission
        run: chmod +x ./gradlew

      - name: Build JAR
        run: ./gradlew bootJar -x test

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ceos-vote:latest
            ${{ secrets.DOCKER_USERNAME }}/ceos-vote:${{ github.event.workflow_run.head_sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # EC2에 설정 파일 동기화
      - name: Sync config files to EC2
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345   # v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          source: "docker-compose.yml,nginx/nginx.conf"
          target: "/home/ubuntu/ceos-vote/"

      # EC2 배포
      - name: Deploy to EC2
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2    #v1.2.5
        env:
          IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_KEY }}
          envs: IMAGE_TAG,DOCKER_USERNAME
          script: |
            set -e
            cd /home/ubuntu/ceos-vote

            echo ">>> Pulling image"
            sudo docker pull ${DOCKER_USERNAME}/ceos-vote:${IMAGE_TAG}
            sudo docker tag ${DOCKER_USERNAME}/ceos-vote:${IMAGE_TAG} ${DOCKER_USERNAME}/ceos-vote:latest


            echo ">>> Restarting containers"
            sudo docker compose up -d                       # 변경된 서비스만 재생성
            sudo docker compose exec -T nginx nginx -t \
              && sudo docker compose exec -T nginx nginx -s reload   # nginx.conf 변경 반영

            echo ">>> Waiting for app to be healthy"
            if ! sudo docker compose up -d --wait --wait-timeout 300; then
              echo ">>> One or more services failed to become healthy"
              sudo docker compose ps
              sudo docker compose logs --tail=200
              exit 1
            fi


            sudo docker image prune -f