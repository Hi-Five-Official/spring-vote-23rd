spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true     # JPA가 테이블 만든 후 SQL 실행
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
    show-sql: true
  sql:
    init:
      mode: always  # data.sql 자동 실행
