spring:
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true     # JPA가 테이블 만든 후 SQL 실행
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        default_batch_fetch_size: 100
    show-sql: true
  sql:
    init:
      mode: always  # data.sql 자동 실행

jwt:
  secret: ${JWT_SECRET_KEY}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION}
  cookie-secure: ${JWT_COOKIE_SECURE}
  refresh-cookie-path: ${JWT_REFRESH_COOKIE_PATH}

swagger:
  server-url: ${SWAGGER_SERVER_URL}
  server-description: ${SWAGGER_SERVER_DESCRIPTION}
