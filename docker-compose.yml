services:
  mysql:
    image: mysql:8.4
    container_name: vote-service-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: vote_service
      MYSQL_USER: vote
      MYSQL_PASSWORD: vote1234
      MYSQL_ROOT_PASSWORD: root1234
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
